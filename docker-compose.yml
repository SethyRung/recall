services:
  db:
    image: postgres:18-alpine
    container_name: recall_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - recall_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Recall"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  recall_pgdata:
